# prometheus.yml
# Prometheus scrape configuration.
# Prometheus polls each /metrics endpoint every 15 seconds.
# All services expose metrics via prom-client (Node.js) or
# prometheus-fastapi-instrumentator (Python/FastAPI).

global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate alerting rules
  scrape_timeout:      10s

# ── Alerting ──────────────────────────────────────────────────────────────────
# Uncomment when Alertmanager is added:
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus monitors itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Auth Service — Node.js, exposes GET /metrics via prom-client
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3001']
    metrics_path: '/metrics'

  # Chat Service — Node.js
  - job_name: 'chat-service'
    static_configs:
      - targets: ['chat-service:3002']
    metrics_path: '/metrics'

  # User Service — Node.js
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3003']
    metrics_path: '/metrics'

  # Dashboard Service — Python FastAPI
  - job_name: 'dashboard-service'
    static_configs:
      - targets: ['dashboard-service:3004']
    metrics_path: '/metrics'

  # Node Exporter — host machine metrics (CPU, memory, disk)
  # Run as: docker run -d --net="host" --pid="host" prom/node-exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # RabbitMQ metrics via rabbitmq_prometheus plugin
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: '/metrics'

  # Redis exporter
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']