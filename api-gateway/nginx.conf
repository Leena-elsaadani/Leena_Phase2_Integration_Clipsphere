env REDIS_HOST;
env REDIS_PORT;
env REDIS_PASSWORD;
env REDIS_DB;
env JWT_EXPECTED_ISSUER;

events {}

http {
  # ADR-002: 100 req/min per user at gateway.
  limit_req_zone $http_authorization zone=user_rate:10m rate=100r/m;

  upstream auth_service {
    server auth-service:3001;
  }
  upstream user_service {
    server user-service:3003;
  }
  upstream chat_service {
    server chat-service:3002;
  }
  upstream dashboard_service {
    server dashboard-service:3004;
  }

  server {
    listen 8080;

    # Public auth endpoints (no JWT gate here).
    location /auth/ {
      limit_req zone=user_rate burst=20 nodelay;
      proxy_pass http://auth_service;
    }

    # Protected service routes with local RS256 verification.
    location /users {
      access_by_lua_file /etc/nginx/lua/jwt_auth.lua;
      limit_req zone=user_rate burst=20 nodelay;
      proxy_pass http://user_service;
    }

    location /users/ {
      access_by_lua_file /etc/nginx/lua/jwt_auth.lua;
      limit_req zone=user_rate burst=20 nodelay;
      proxy_pass http://user_service;
    }

    location /rooms {
      access_by_lua_file /etc/nginx/lua/jwt_auth.lua;
      limit_req zone=user_rate burst=20 nodelay;
      proxy_pass http://chat_service;
    }

    location /rooms/ {
      access_by_lua_file /etc/nginx/lua/jwt_auth.lua;
      limit_req zone=user_rate burst=20 nodelay;
      proxy_pass http://chat_service;
    }

    location /ws {
      access_by_lua_file /etc/nginx/lua/jwt_auth.lua;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://chat_service;
    }

    location /dashboard/ {
      access_by_lua_file /etc/nginx/lua/jwt_auth.lua;
      limit_req zone=user_rate burst=20 nodelay;
      proxy_pass http://dashboard_service;
    }

    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }
  }
}
