version: "3.8"

services:
  minio:
    image: minio/minio
    container_name: clipsphere-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin_Clipsphere
      MINIO_ROOT_PASSWORD: ldm_Clipsphere
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data: